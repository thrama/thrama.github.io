baseURL = "https://thrama.github.io/"
locale = "en"
title = "Lorenzo Lombardi"
theme = "PaperMod"

# Build settings
enableRobotsTXT = true
enableEmoji = false
buildDrafts = false
buildFuture = false

[pagination]
  pagerSize = 10

[params]
  author = "Lorenzo Lombardi"
  description = "Principal Data Architect | AI-Enhanced Data Governance & Lineage | Enterprise Solutions Architect"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "Lorenzo Lombardi"
    Content = """
Principal Data Architect @ NTT DATA Italia
20+ years of experience in Enterprise Data Management
Specialized in AI-Enhanced Data Governance, Agentic AI, and Informatica products
"""

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/lorenzolombardi"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/thrama"

  [[params.socialIcons]]
    name = "email"
    url = "lorenzo [dot] lombardi [at] gmail [dot] com"

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 10

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 30

[[menu.main]]
  identifier = "links"
  name = "Links"
  url = "/links/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true
  [markup.goldmark.renderer]
    unsafe = true
