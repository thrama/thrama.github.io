baseURL = "https://thrama.github.io/"
defaultContentLanguage = "it"
title = "Lorenzo Lombardi"
theme = "PaperMod"

[languages]
  [languages.it]
    languageCode = "it"
    languageName = "Italiano"
    contentDir = "content/it"
    weight = 1
    title = "Lorenzo Lombardi"
    [languages.it.params]
      description = "Principal Data Architect | Data Governance & Informatica Expert"
    [languages.it.params.homeInfoParams]
      Title = "Lorenzo Lombardi"
      Content = """
Principal Data Architect @ NTT DATA Italia
20+ anni di esperienza in Enterprise Data Management
Specializzato in Data Governance e prodotti Informatica
"""

  [languages.en]
    languageCode = "en"
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    title = "Lorenzo Lombardi"
    [languages.en.params]
      description = "Principal Data Architect | Data Governance & Informatica Expert"
    [languages.en.params.homeInfoParams]
      Title = "Lorenzo Lombardi"
      Content = """
Principal Data Architect @ NTT DATA Italia
20+ years of experience in Enterprise Data Management
Specialized in Data Governance and Informatica products
"""

# Paginazione
[pagination]
  pagerSize = 10

# Abilita emoji
enableEmoji = false

# Build settings
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  author = "Lorenzo Lombardi"
  description = "Principal Data Architect | Data Governance & Informatica Expert"

  # Tema
  defaultTheme = "auto"  # auto, light, dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowToc = true
  TocOpen = false

  # Social icons (header)
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/lorenzolombardi"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/thrama"

  [[params.socialIcons]]
    name = "email"
    url = "lorenzo [dot] lombardi [at] gmail [dot] com"

# Menu italiano
[[languages.it.menu.main]]
  identifier = "about"
  name = "Chi Sono"
  url = "/about/"
  weight = 10

[[languages.it.menu.main]]
  identifier = "cv"
  name = "CV"
  url = "/cv/"
  weight = 20

[[languages.it.menu.main]]
  identifier = "progetti"
  name = "Progetti"
  url = "/progetti/"
  weight = 30

[[languages.it.menu.main]]
  identifier = "posts"
  name = "Articoli"
  url = "/posts/"
  weight = 40

[[languages.it.menu.main]]
  identifier = "links"
  name = "Links"
  url = "/links/"
  weight = 50

# Menu inglese
[[languages.en.menu.main]]
  identifier = "about"
  name = "About"
  url = "/en/about/"
  weight = 10

[[languages.en.menu.main]]
  identifier = "cv"
  name = "CV"
  url = "/en/cv/"
  weight = 20

[[languages.en.menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/en/projects/"
  weight = 30

[[languages.en.menu.main]]
  identifier = "posts"
  name = "Articles"
  url = "/en/posts/"
  weight = 40

[[languages.en.menu.main]]
  identifier = "links"
  name = "Links"
  url = "/en/links/"
  weight = 50

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Markup settings
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true
  [markup.goldmark.renderer]
    unsafe = true
